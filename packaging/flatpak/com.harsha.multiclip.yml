app-id: com.harsha.multiclip
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: multiclip

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: multiclip
    buildsystem: meson
    sources:
      - type: dir
        path: ../..
